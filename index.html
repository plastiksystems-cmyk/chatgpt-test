<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Documentation Page</title>
  <style>
    body {
      display: flex;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    nav {
      width: 250px;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid #ccc;
      padding: 20px;
      box-sizing: border-box;
    }

    nav a {
      display: block;
      margin-bottom: 10px;
      text-decoration: none;
      color: #333;
    }

    nav a:hover {
      color: #007bff;
    }

    main {
      flex-grow: 1;
      padding: 20px;
      height: 100vh;
      overflow-y: auto;
      box-sizing: border-box;
    }

    section {
      margin-bottom: 50px;
    }

    section h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <nav id="sidebar"></nav>
  <main id="content"></main>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
